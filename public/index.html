<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥖</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Boulanges Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Upload Form -->
  <div id="upload-section" class="upload-section">
    <div class="upload-container">
      <h1>Boulanges Finder</h1>
      <p>Trouve boulanges, cafés et tout plein de choses intéressantes pour planifier ton parcours</p>

      <button id="install-btn" class="install-btn hidden">📲 Installer l'application</button>

      <form id="gpx-form" class="upload-form">
        <div class="file-input-wrapper">
          <input type="file" id="gpx-file" name="gpx" accept=".gpx" required>
          <label for="gpx-file" class="file-label">
            <span class="file-icon">📁</span>
            <span class="file-text">Choisir un fichier GPX</span>
          </label>
          <span id="file-name" class="file-name"></span>
        </div>

        <div class="detour-input">
          <label for="max-detour">Détour max (m)</label>
          <input type="number" id="max-detour" name="maxDetour" value="2000" min="100" max="2000" step="100">
        </div>

        <div class="poi-selection">
          <p class="poi-selection-label">Y'a pas que les boulanges dans la vie :</p>
          <div class="poi-checkboxes">
            <label class="poi-checkbox">
              <input type="checkbox" name="poi-bakery" id="poi-bakery" checked>
              <span class="poi-icon bakery">🥖</span>
              <span>Boulanges</span>
            </label>
            <label class="poi-checkbox">
              <input type="checkbox" name="poi-cafe" id="poi-cafe">
              <span class="poi-icon cafe">☕</span>
              <span>Cafés</span>
            </label>
            <label class="poi-checkbox">
              <input type="checkbox" name="poi-water" id="poi-water">
              <span class="poi-icon water">💧</span>
              <span>Points d'eau</span>
            </label>
            <label class="poi-checkbox">
              <input type="checkbox" name="poi-toilets" id="poi-toilets">
              <span class="poi-icon toilets">🚻</span>
              <span>Toilettes</span>
            </label>
            <label class="poi-checkbox">
              <input type="checkbox" name="poi-hotel" id="poi-hotel">
              <span class="poi-icon hotel">🏨</span>
              <span>Hôtels</span>
            </label>
            <label class="poi-checkbox">
              <input type="checkbox" name="poi-camping" id="poi-camping">
              <span class="poi-icon camping">⛺</span>
              <span>Campings</span>
            </label>
            <label class="poi-checkbox">
              <input type="checkbox" name="poi-restaurant" id="poi-restaurant">
              <span class="poi-icon restaurant">🍽️</span>
              <span>Restaurants</span>
            </label>
            <label class="poi-checkbox">
              <input type="checkbox" name="poi-supermarket" id="poi-supermarket">
              <span class="poi-icon supermarket">🛒</span>
              <span>Supermarchés</span>
            </label>
          </div>
        </div>

        <button type="submit" class="submit-btn">
          <span class="btn-text">Analyser la map</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>

      <!-- Cached GPX list (client-side) -->
      <div id="cached-gpx-section" class="cached-gpx-section hidden">
        <p class="cached-gpx-title">Tes maps</p>
        <div id="cached-gpx-list" class="cached-gpx-list"></div>
      </div>

      <!-- Server traces list -->
      <div id="server-traces-section" class="server-cache-section hidden">
        <p class="server-cache-title">Mes traces</p>
        <div id="server-traces-list" class="server-cache-list"></div>
      </div>
    </div>
  </div>

  <!-- Map Section -->
  <div id="map-section" class="map-section hidden">
    <div id="map"></div>

    <!-- Controls Panel -->
    <div class="controls-panel" id="controls-panel">
      <button id="back-btn" class="control-btn">←</button>
      <button id="share-btn" class="control-btn" title="Partager">🔗</button>
      <button id="fav-filter-btn" class="control-btn" title="Afficher seulement les favoris">☆</button>
      <button id="add-poi-btn" class="control-btn" title="Ajouter un POI manuellement">➕</button>
      <button id="cache-offline-btn" class="control-btn" title="Préparer pour hors-ligne">📥</button>
      <button id="export-gpx" class="control-btn">GPX</button>
      <button id="export-csv" class="control-btn">CSV</button>
      <button id="export-json" class="control-btn">JSON</button>
    </div>

    <!-- Add custom POI modal -->
    <div id="add-poi-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Ajouter un POI</h3>
        <input type="text" id="custom-poi-name" placeholder="Nom du lieu" autocomplete="off">
        <select id="custom-poi-type">
          <option value="custom">📌 Personnalisé</option>
          <option value="bakery">🥖 Boulangerie</option>
          <option value="cafe">☕ Café</option>
          <option value="water">💧 Point d'eau</option>
          <option value="toilets">🚻 Toilettes</option>
          <option value="hotel">🏨 Hébergement</option>
          <option value="camping">⛺ Camping</option>
          <option value="restaurant">🍽️ Restaurant</option>
          <option value="supermarket">🛒 Supermarché</option>
        </select>
        <textarea id="custom-poi-notes" placeholder="Notes (optionnel)" rows="2"></textarea>
        <div class="modal-actions">
          <button id="cancel-add-poi" class="modal-btn modal-btn-cancel">Annuler</button>
          <button id="confirm-add-poi" class="modal-btn modal-btn-confirm">Ajouter</button>
        </div>
      </div>
    </div>

    <!-- POI Type Filter -->
    <div id="poi-type-filter" class="poi-type-filter hidden"></div>

    <!-- Geolocation Button -->
    <button id="geoloc-btn" class="geoloc-btn" title="Ma position">📍</button>

    <!-- Footer -->
    <div class="map-footer">Boulanges Finder made with ❤️ par <a href="mailto:ciril@pm.me">Cyril</a></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
